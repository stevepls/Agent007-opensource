# Pre-commit hooks for Agent007 Orchestrator
# See: https://pre-commit.com/
#
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files

repos:
  # ═══════════════════════════════════════════════════════════════════════════════
  # DevOps Standards (custom)
  # ═══════════════════════════════════════════════════════════════════════════════
  - repo: local
    hooks:
      - id: devops-standards
        name: DevOps Standards Check
        entry: ./DevOps/standards/hooks/check-standards.sh
        language: script
        pass_filenames: false
        always_run: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # General Checks
  # ═══════════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(vendor/|node_modules/)
      - id: end-of-file-fixer
        exclude: ^(vendor/|node_modules/)
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # ═══════════════════════════════════════════════════════════════════════════════
  # Python
  # ═══════════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.11
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-strict-optional]
        additional_dependencies: []
        exclude: ^(tests/|vendor/)

  # ═══════════════════════════════════════════════════════════════════════════════
  # Shell Scripts
  # ═══════════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        args: [--severity=warning, --exclude=SC1090,SC1091]

  # ═══════════════════════════════════════════════════════════════════════════════
  # Security
  # ═══════════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: (\.env\.example$|credentials\.env\.example$)

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^tests/

  # ═══════════════════════════════════════════════════════════════════════════════
  # Docker
  # ═══════════════════════════════════════════════════════════════════════════════
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3008, --ignore, DL3013, --ignore, DL3018]

  # ═══════════════════════════════════════════════════════════════════════════════
  # PHP (if applicable)
  # ═══════════════════════════════════════════════════════════════════════════════
  - repo: local
    hooks:
      - id: php-syntax
        name: PHP Syntax Check
        entry: bash -c 'for f in "$@"; do php -l "$f" || exit 1; done' --
        language: system
        files: \.php$
        exclude: ^vendor/

# ═══════════════════════════════════════════════════════════════════════════════
# Configuration
# ═══════════════════════════════════════════════════════════════════════════════
default_language_version:
  python: python3

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from hooks
  autofix_prs: true
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly

exclude: |
  (?x)^(
    vendor/|
    node_modules/|
    \.git/|
    \.venv/|
    __pycache__/|
    \.mypy_cache/
  )
